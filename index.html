<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bó Hoa Hạt Sáng & Lá Thư</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #guide {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #FFB6C1; font-size: 16px; font-weight: bold; text-shadow: 0 0 10px #FF69B4;
            z-index: 10; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
            border: 1px solid #FF69B4;
        }

        #letter-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            width: 80%; max-width: 600px; z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            border-radius: 15px; padding: 40px; text-align: left;
            opacity: 0; pointer-events: none; transition: all 1s ease;
        }

        #letter-ui.visible {
            transform: translate(-50%, -50%);
            opacity: 1; pointer-events: auto;
        }

        #letter-content {
            font-size: 28px; color: #FFB6C1; font-family: 'Dancing Script', cursive; line-height: 1.6;
            text-shadow: 0 2px 4px black; white-space: pre-wrap;
        }

        /* Nút chuyển hướng mới */
        #btn-next {
            margin-top: 30px; background: linear-gradient(45deg, #FF1493, #FF69B4); 
            color: #FFF; border: none; padding: 12px 35px; border-radius: 30px; 
            font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
            transition: 0.3s; display: block; margin-left: auto; margin-right: auto;
        }
        #btn-next:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 20, 147, 0.9); }
    </style>
</head>
<body>

    <div id="guide">✨ Nhấn vào lá thư để mở ✨</div>

    <div id="letter-ui">
        <div id="letter-content">Đang tải nội dung...</div>
        <button id="btn-next" onclick="goToClassPage()">Chúng ta</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const receiverName = urlParams.get('name') || "Cậu";

        const wishes = [
            "Chúc tuổi mới luôn rạng rỡ, xinh đẹp và mọi ước mơ đều trở thành hiện thực.",
            "Mong mọi điều tốt đẹp nhất, dịu dàng nhất sẽ đến trong ngày đặc biệt này.",
            "Cảm ơn vì đã luôn là một phần tuyệt vời của tuổi thanh xuân."
        ];
        
        const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
        const fullText = `Gửi ${receiverName},\n\n${randomWish}\n\nMãi trân trọng!`;
        document.getElementById('letter-content').innerText = fullText;

        // Hàm chuyển hướng sang module 12c2
        function goToClassPage() {
            // Chuyển sang file index.html nằm trong thư mục 12c2
            window.location.href = './12c2/index.html';
        }

        let scene, camera, renderer, bouquetParticles, letterParticles, raycaster, mouse;
        let isLetterOpen = false;

        function createCustomTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const cx = 64, cy = 64;
            
            if (type === 'pink_glow') { 
                const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
                grd.addColorStop(0, '#FFFFFF'); grd.addColorStop(0.2, '#FFC0CB'); grd.addColorStop(0.5, '#FF69B4'); grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd; ctx.fillRect(0,0,128,128);
            } else if (type === 'gold_glow') {
                const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
                grd.addColorStop(0, '#FFFFFF'); grd.addColorStop(0.3, '#FFD700'); grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd; ctx.fillRect(0,0,128,128);
            } else if (type === 'white_glow') {
                const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
                grd.addColorStop(0, '#FFFFFF'); grd.addColorStop(0.3, '#FDF5E6'); grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd; ctx.fillRect(0,0,128,128);
            }
            return new THREE.CanvasTexture(canvas);
        }

        const texPink = createCustomTexture('pink_glow');
        const texGold = createCustomTexture('gold_glow');
        const texWhite = createCustomTexture('white_glow');

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); 
            scene.fog = new THREE.FogExp2(0x000000, 0.005);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera.position.z = 120;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            raycaster.params.Points.threshold = 4;
            mouse = new THREE.Vector2();

            createBouquet();
            createLetter();

            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createBouquet() {
            const count = 6000;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const targets = [];
            
            for(let i=0; i<count; i++) {
                let x, y, z;
                let c = new THREE.Color();

                if (Math.random() < 0.6) {
                    // Phần trên: Các cụm hoa (Bề mặt gồ ghề)
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(Math.random()); // Nửa trên
                    // Dùng toán học tạo độ nhấp nhô giống các bông hoa sát nhau
                    const bump = Math.sin(theta * 8) * Math.sin(phi * 8) * 2; 
                    const r = 22 + bump; 
                    
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.cos(phi) + 6;
                    z = r * Math.sin(phi) * Math.sin(theta);
                    
                    // Màu hồng/đỏ
                    c.setHex(Math.random() > 0.4 ? 0xFF1493 : 0xFF69B4);
                } else {
                    // Phần dưới: Giấy gói hoa (Hình nón thắt eo)
                    const v = Math.random(); 
                    y = -40 * v + 6; 
                    
                    let r;
                    if (y > -15) { r = 7 + 15 * ((y + 15) / 21); } // Thu từ trên xuống eo
                    else { r = 7 + 6 * ((-15 - y) / 25); } // Loe từ eo xuống đuôi
                    
                    const theta = Math.random() * 2 * Math.PI;
                    x = r * Math.cos(theta);
                    z = r * Math.sin(theta);
                    
                    // Màu giấy trắng/hồng nhạt
                    c.setHex(0xFFE4E1); 
                }

                x -= 30; // Đẩy bó hoa sang trái
                positions.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200);
                targets.push(x, y, z);
                colors.push(c.r, c.g, c.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.userData = { targets: targets, originalTargets: [...targets] };

            const material = new THREE.PointsMaterial({
                size: 2.2, map: texWhite, transparent: true, vertexColors: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });

            bouquetParticles = new THREE.Points(geometry, material);
            scene.add(bouquetParticles);
        }

        function createLetter() {
            const count = 2500;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const targetsIdle = [];
            const targetsOpen = [];

            for(let i=0; i<count; i++) {
                let tx = (Math.random() - 0.5) * 40 + 35; 
                let ty = (Math.random() - 0.5) * 25 - 5;
                let tz = (Math.random() - 0.5) * 2;
                if(ty > 0 && Math.abs(tx - 35) + ty * 1.5 < 20) { tz += 2; }
                targetsIdle.push(tx, ty, tz);

                let ox = (Math.random() - 0.5) * 120;
                let oy = (Math.random() - 0.5) * 80;
                let oz = (Math.random() - 0.5) * 10 - 20; 
                targetsOpen.push(ox, oy, oz);

                positions.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.userData = { targetsIdle: targetsIdle, targetsOpen: targetsOpen, currentTargets: targetsIdle };

            const material = new THREE.PointsMaterial({
                size: 2.0, map: texGold, transparent: true, color: 0xFFD700,
                blending: THREE.AdditiveBlending, depthWrite: false
            });

            letterParticles = new THREE.Points(geometry, material);
            scene.add(letterParticles);
        }

        function onClick(event) {
            if (isLetterOpen) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (raycaster.intersectObject(letterParticles).length > 0) {
                openLetter();
            }
        }

        function openLetter() {
            isLetterOpen = true;
            document.getElementById('guide').style.display = 'none';
            letterParticles.geometry.userData.currentTargets = letterParticles.geometry.userData.targetsOpen;
            
            const bTargets = bouquetParticles.geometry.userData.targets;
            for(let i=0; i<bTargets.length; i+=3) { bTargets[i] -= 20; }

            setTimeout(() => { document.getElementById('letter-ui').classList.add('visible'); }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isLetterOpen) {
                bouquetParticles.rotation.y += 0.005;
                letterParticles.position.y = Math.sin(Date.now() * 0.002) * 2;
            } else {
                letterParticles.position.y = 0; 
                letterParticles.rotation.z += 0.0005; 
            }

            const speed = 0.05;
            const bPos = bouquetParticles.geometry.attributes.position.array;
            const bTar = bouquetParticles.geometry.userData.targets;
            for(let i=0; i<bPos.length; i++) { bPos[i] += (bTar[i] - bPos[i]) * speed; }
            bouquetParticles.geometry.attributes.position.needsUpdate = true;

            const lPos = letterParticles.geometry.attributes.position.array;
            const lTar = letterParticles.geometry.userData.currentTargets;
            for(let i=0; i<lPos.length; i++) { lPos[i] += (lTar[i] - lPos[i]) * speed; }
            letterParticles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
